
<style>
  .sheet-wrap { padding: 1rem 0; font-family: var(--font-sans); }
  .sheet-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .sheet-title i { font-size: 16px; color: #34a853; }
  .table-scroll { overflow-x: auto; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); }
  table { width: 100%; border-collapse: collapse; min-width: 560px; }
  thead tr { background: #e8f0fe; }
  thead td { padding: 9px 14px; font-size: 12px; font-weight: 500; color: #1a56c4; border-right: 0.5px solid #c5d4f7; text-align: center; }
  thead td:last-child { border-right: none; }
  .col-letter { display: block; font-size: 11px; color: #6b87d4; font-weight: 400; margin-bottom: 1px; }
  .col-name { display: block; font-size: 12px; font-weight: 500; color: #1a3e8c; }
  tbody tr { background: var(--color-background-primary); }
  tbody td { padding: 10px 14px; font-size: 13px; color: var(--color-text-secondary); border-right: 0.5px solid var(--color-border-tertiary); border-top: 0.5px solid var(--color-border-tertiary); }
  tbody td:last-child { border-right: none; }
</style>

  <div class="sheet-title">
    <i class="ti ti-table" aria-hidden="true"></i>
    Estrutura da planilha — cadastro de produtos
  </div>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <td><span class="col-letter">A</span><span class="col-name">ID / SKU</span></td>
          <td><span class="col-letter">B</span><span class="col-name">Nome</span></td>
          <td><span class="col-letter">C</span><span class="col-name">Categoria</span></td>
          <td><span class="col-letter">D</span><span class="col-name">Descrição</span></td>
          <td><span class="col-letter">E</span><span class="col-name">Preço</span></td>
          <td><span class="col-letter">F</span><span class="col-name">Fotos</span></td>
        </tr>
      </thead>
      <tbody>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
      </tbody>
    </table>
  </div>
</div>
